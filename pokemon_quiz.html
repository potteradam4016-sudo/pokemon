<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 이름 맞추기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem 3rem;
  }
  #app {
    background: #fff;
    border-radius: 20px;
    padding: 1.5rem 1.25rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .header { margin-bottom: 1.25rem; }
  .header h1 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
  .header p { font-size: 13px; color: #888; }
  .score-bar { display: flex; gap: 10px; margin-bottom: 1.25rem; }
  .score-card {
    flex: 1; background: #f7f8fa; border-radius: 12px;
    padding: 10px 6px; text-align: center;
  }
  .score-card .num { font-size: 22px; font-weight: 700; color: #1a1a2e; }
  .score-card.c { color: #3a9e3a; }
  .score-card.c .num { color: #3a9e3a; }
  .score-card.w .num { color: #e04040; }
  .score-card .lbl { font-size: 11px; color: #aaa; margin-top: 2px; }
  .progress-bar-wrap { background: #eee; border-radius: 99px; height: 5px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #4a90e2; border-radius: 99px; transition: width 0.4s; }
  .progress-text { text-align: right; font-size: 12px; color: #aaa; margin-top: 4px; margin-bottom: 1rem; }
  .sprite-box {
    background: linear-gradient(135deg, #e8f0fe 0%, #f3e8ff 100%);
    border-radius: 18px;
    padding: 1.5rem 1rem;
    text-align: center;
    margin-bottom: 1.25rem;
    position: relative;
    min-height: 170px;
    display: flex; align-items: center; justify-content: center;
  }
  .sprite-box img {
    width: 130px; height: 130px;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  .dex-badge {
    position: absolute; top: 10px; right: 12px;
    font-size: 11px; color: #7a7aaa;
    background: rgba(255,255,255,0.75);
    border-radius: 20px; padding: 3px 10px;
    font-weight: 600;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .opt-btn {
    background: #fff; border: 1.5px solid #e0e4ee;
    border-radius: 12px; padding: 13px 8px;
    font-size: 14px; font-weight: 500; color: #2a2a3e;
    cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:active { transform: scale(0.97); }
  .opt-btn.correct { background: #e8f7e8; border-color: #4caf50; color: #2a7a2a; }
  .opt-btn.wrong { background: #fdecea; border-color: #e53935; color: #b71c1c; }
  .opt-btn:disabled { cursor: default; }
  .feedback {
    text-align: center; font-size: 15px; font-weight: 600;
    min-height: 24px; margin-bottom: 1rem;
  }
  .next-btn {
    width: 100%; background: #4a90e2; border: none;
    border-radius: 12px; padding: 14px;
    font-size: 15px; font-weight: 600; color: #fff;
    cursor: pointer; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .next-btn:active { background: #357abd; }
  .result-box { text-align: center; padding: 1.5rem 0.5rem; }
  .result-icon { font-size: 64px; margin-bottom: 12px; }
  .result-box h2 { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .result-box .score-big {
    font-size: 48px; font-weight: 800; color: #4a90e2;
    margin-bottom: 4px; line-height: 1;
  }
  .result-box .score-label { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .restart-btn {
    background: #4a90e2; border: none;
    border-radius: 12px; padding: 14px 36px;
    font-size: 15px; font-weight: 600; color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .restart-btn:active { background: #357abd; }
  .loading { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>포켓몬 이름 맞추기</h1>
    <p>1세대 포켓몬 · 10문제</p>
  </div>
  <div class="score-bar">
    <div class="score-card c"><div class="num" id="correct-num">0</div><div class="lbl">정답</div></div>
    <div class="score-card w"><div class="num" id="wrong-num">0</div><div class="lbl">오답</div></div>
    <div class="score-card"><div class="num" id="remain-num">10</div><div class="lbl">남은 문제</div></div>
  </div>
  <div id="quiz-area"><div class="loading">로딩 중...</div></div>
</div>

<script>
const GEN1 = [
  {id:1,name:"이상해씨"},{id:2,name:"이상해풀"},{id:3,name:"이상해꽃"},
  {id:4,name:"파이리"},{id:5,name:"리자드"},{id:6,name:"리자몽"},
  {id:7,name:"꼬부기"},{id:8,name:"어니부기"},{id:9,name:"거북왕"},
  {id:10,name:"캐터피"},{id:11,name:"단데기"},{id:12,name:"버터플"},
  {id:13,name:"뿔충이"},{id:14,name:"딱충이"},{id:15,name:"독침붕"},
  {id:16,name:"구구"},{id:17,name:"피죤"},{id:18,name:"피죤투"},
  {id:19,name:"꼬렛"},{id:20,name:"레트라"},{id:21,name:"깨비참"},
  {id:22,name:"깨비드릴조"},{id:23,name:"아보"},{id:24,name:"아보크"},
  {id:25,name:"피카츄"},{id:26,name:"라이츄"},{id:27,name:"모래두지"},
  {id:28,name:"고지"},{id:29,name:"니드런♀"},{id:30,name:"니드리나"},
  {id:31,name:"니드퀸"},{id:32,name:"니드런♂"},{id:33,name:"니드리노"},
  {id:34,name:"니드킹"},{id:35,name:"삐삐"},{id:36,name:"픽시"},
  {id:37,name:"식스테일"},{id:38,name:"나인테일"},{id:39,name:"푸린"},
  {id:40,name:"푸크린"},{id:41,name:"주뱃"},{id:42,name:"골뱃"},
  {id:43,name:"뚜벅초"},{id:44,name:"냄새꼴"},{id:45,name:"라플레시아"},
  {id:46,name:"파라스"},{id:47,name:"파라섹트"},{id:48,name:"콘팡"},
  {id:49,name:"도나리"},{id:50,name:"디그다"},{id:51,name:"닥트리오"},
  {id:52,name:"나옹"},{id:53,name:"페르시온"},{id:54,name:"고라파덕"},
  {id:55,name:"골덕"},{id:56,name:"망키"},{id:57,name:"성원숭"},
  {id:58,name:"가디"},{id:59,name:"윈디"},{id:60,name:"발챙이"},
  {id:61,name:"슈륙챙이"},{id:62,name:"강챙이"},{id:63,name:"캐이시"},
  {id:64,name:"윤겔라"},{id:65,name:"후딘"},{id:66,name:"알통몬"},
  {id:67,name:"시전몬"},{id:68,name:"괴력몬"},{id:69,name:"모다피"},
  {id:70,name:"우츠동"},{id:71,name:"우츠보트"},{id:72,name:"왕눈해"},
  {id:73,name:"독파리"},{id:74,name:"꼬마돌"},{id:75,name:"데구리"},
  {id:76,name:"딱구리"},{id:77,name:"포니타"},{id:78,name:"날쌩마"},
  {id:79,name:"야돈"},{id:80,name:"야도란"},{id:81,name:"코일"},
  {id:82,name:"레어코일"},{id:83,name:"파오리"},{id:84,name:"두두"},
  {id:85,name:"두트리오"},{id:86,name:"쥬쥬"},{id:87,name:"쥬레곤"},
  {id:88,name:"질퍽이"},{id:89,name:"질뻐기"},{id:90,name:"셀러"},
  {id:91,name:"킹크랩"},{id:92,name:"고오스"},{id:93,name:"고우스트"},
  {id:94,name:"팬텀"},{id:95,name:"롱스톤"},{id:96,name:"슬리프"},
  {id:97,name:"슬리프킹"},{id:98,name:"크랩"},{id:99,name:"킹크랩"},
  {id:100,name:"찌리리공"},{id:101,name:"붐볼"},{id:102,name:"아라리"},
  {id:103,name:"나시"},{id:104,name:"탕구리"},{id:105,name:"텅구리"},
  {id:106,name:"시라소몬"},{id:107,name:"홍수몬"},{id:108,name:"내루미"},
  {id:109,name:"또가스"},{id:110,name:"또도가스"},{id:111,name:"뿔카노"},
  {id:112,name:"코뿌리"},{id:113,name:"럭키"},{id:114,name:"덩쿠리"},
  {id:115,name:"캥카"},{id:116,name:"쏘드라"},{id:117,name:"시드라"},
  {id:118,name:"콘치"},{id:119,name:"왕콘치"},{id:120,name:"별가사리"},
  {id:121,name:"아쿠스타"},{id:122,name:"마임맨"},{id:123,name:"스라크"},
  {id:124,name:"루주라"},{id:125,name:"에레브"},{id:126,name:"마그마"},
  {id:127,name:"쁘사이저"},{id:128,name:"켄타로스"},{id:129,name:"잉어킹"},
  {id:130,name:"갸라도스"},{id:131,name:"라프라스"},{id:132,name:"메타몽"},
  {id:133,name:"이브이"},{id:134,name:"샤워스"},{id:135,name:"쥬피썬더"},
  {id:136,name:"부스터"},{id:137,name:"폴리곤"},{id:138,name:"암나이트"},
  {id:139,name:"암스타"},{id:140,name:"투구"},{id:141,name:"투구푸스"},
  {id:142,name:"프테라"},{id:143,name:"잠만보"},{id:144,name:"프리져"},
  {id:145,name:"썬더"},{id:146,name:"파이어"},{id:147,name:"미뇽"},
  {id:148,name:"신뇽"},{id:149,name:"망나뇽"},{id:150,name:"뮤츠"},
  {id:151,name:"뮤"}
];

const TOTAL = 10;
let questions = [], current = 0, correct = 0, wrong = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeQuestions() {
  const pool = shuffle(GEN1);
  questions = pool.slice(0, TOTAL).map(poke => {
    const wrong4 = shuffle(GEN1.filter(p => p.id !== poke.id)).slice(0, 3);
    const opts = shuffle([poke, ...wrong4]);
    return { poke, opts };
  });
}

function updateScores() {
  document.getElementById('correct-num').textContent = correct;
  document.getElementById('wrong-num').textContent = wrong;
  document.getElementById('remain-num').textContent = Math.max(0, TOTAL - current);
}

function renderQuiz() {
  if (current >= TOTAL) { renderResult(); return; }
  const { poke, opts } = questions[current];
  answered = false;
  const pct = Math.round((current / TOTAL) * 100);
  document.getElementById('quiz-area').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <p class="progress-text">${current + 1} / ${TOTAL}</p>
    <div class="sprite-box">
      <span class="dex-badge">#${String(poke.id).padStart(3,'0')}</span>
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${poke.id}.png" alt="포켓몬" />
    </div>
    <div class="options">
      ${opts.map(o => `<button class="opt-btn" onclick="choose(this,'${o.name}','${poke.name}')">${o.name}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQ()">
      ${current + 1 === TOTAL ? '결과 보기 →' : '다음 문제 →'}
    </button>
  `;
}

function choose(btn, chosen, answer) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === answer) b.classList.add('correct');
  });
  const fb = document.getElementById('fb');
  if (chosen === answer) {
    btn.classList.add('correct');
    fb.textContent = '정답! 🎉';
    fb.style.color = '#2a7a2a';
    correct++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = `오답! 정답은 ${answer}`;
    fb.style.color = '#b71c1c';
    wrong++;
  }
  updateScores();
  document.getElementById('next-btn').style.display = 'block';
}

function nextQ() {
  current++;
  renderQuiz();
}

function getRank(score) {
  if (score === 10) return { icon: '🏆', msg: '완벽한 포켓몬 마스터!' };
  if (score >= 8)  return { icon: '⭐', msg: '대단한 실력이에요!' };
  if (score >= 6)  return { icon: '👍', msg: '꽤 잘 아시는군요!' };
  if (score >= 4)  return { icon: '📖', msg: '조금 더 공부해봐요!' };
  return { icon: '🌱', msg: '포켓몬 도감을 펼쳐봐요!' };
}

function renderResult() {
  const rank = getRank(correct);
  document.getElementById('quiz-area').innerHTML = `
    <div class="result-box">
      <div class="result-icon">${rank.icon}</div>
      <h2>${rank.msg}</h2>
      <div class="score-big">${correct}<span style="font-size:24px;color:#aaa"> / ${TOTAL}</span></div>
      <div class="score-label">정답 수</div>
      <button class="restart-btn" onclick="restart()">다시 도전하기</button>
    </div>
  `;
}

function restart() {
  current = 0; correct = 0; wrong = 0;
  updateScores();
  makeQuestions();
  renderQuiz();
}

makeQuestions();
updateScores();
renderQuiz();
</script>
</body>
</html>
